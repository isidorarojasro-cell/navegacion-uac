<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR - Universidad Autónoma de Chile</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1a237e, #283593);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: white;
      border-radius: 20px;
      padding: 40px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      max-width: 380px;
      width: 90%;
    }
    .logo {
      font-size: 2.5rem;
      margin-bottom: 10px;
    }
    h1 {
      font-size: 1.3rem;
      color: #1a237e;
      margin-bottom: 5px;
    }
    p.sub {
      color: #666;
      font-size: 0.85rem;
      margin-bottom: 25px;
    }
    #qrcode {
      display: flex;
      justify-content: center;
      margin: 20px 0;
    }
    #qrcode canvas, #qrcode img {
      border: 6px solid #1a237e;
      border-radius: 12px;
      padding: 8px;
    }
    .info {
      background: #e8eaf6;
      border-radius: 10px;
      padding: 12px;
      font-size: 0.82rem;
      color: #3949ab;
      margin-top: 15px;
    }
    .info span { font-weight: bold; }

    /* Para impresión: fondo blanco, sin gradiente */
    @media print {
      body { background: white !important; }
      .card { box-shadow: none !important; border: 2px solid #1a237e; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🎓</div>
    <h1>Universidad Autónoma de Chile</h1>
    <p class="sub">Pedro de Valdivia, Santiago</p>
    <div id="qrcode"></div>
    <div class="info">
      📍 Escanea este QR para ver la <span>navegación paso a paso</span> desde la entrada hasta tu sala · Piso 6
    </div>
  </div>

  <script>
    const baseUrl = 'https://isidorarojasro.github.io/navegacion-uac/mapa-universidad.html';

    new QRCode(document.getElementById("qrcode"), {
      text: baseUrl,
      width: 220,
      height: 220,
      colorDark: "#1a237e",
      colorLight: "#ffffff",
      correctLevel: QRCode.CorrectLevel.H
    });
  </script>
</body>
</html>
